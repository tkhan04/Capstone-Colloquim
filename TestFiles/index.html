<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colloquium - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Extra styles for password field and register link — keep existing UI */
        .login-footer { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #eee; text-align: center; }
        .login-footer a { color: #003366; text-decoration: none; font-size: 0.9rem; margin: 0 0.5rem; }
        .login-footer a:hover { color: #ff6600; }
    </style>
</head>
<body>
    <div class="container">
        <img src="gburglogo.jpg" alt="Gettysburg College Logo" class="logo">
        <h1>Colloquium</h1>
        <p class="login-subtitle">Sign in with your Gettysburg credentials</p>

        <!-- Login form: email + password, submitted via JS to login.php -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="yourname@gettysburg.edu" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div id="loginResult"></div>

        <div class="login-footer">
            <a href="register.php"><i class="fas fa-user-plus"></i> Create Account</a>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
